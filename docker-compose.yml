services:
  api:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/euphoria
      BETTER_AUTH_SECRET: ${BETTER_AUTH_SECRET:-change-me}
      BETTER_AUTH_URL: ${BETTER_AUTH_URL:-http://localhost:3000}
      CURSOR_SIGNING_SECRET: ${CURSOR_SIGNING_SECRET:-}
      CURSOR_SIGNING_PREVIOUS_SECRETS: ${CURSOR_SIGNING_PREVIOUS_SECRETS:-}
      CHAT_COMMAND_RETENTION_SECONDS: ${CHAT_COMMAND_RETENTION_SECONDS:-}
      CHAT_EVENT_RETENTION_SECONDS: ${CHAT_EVENT_RETENTION_SECONDS:-}
      NOTIFICATION_PUSH_JOB_AVAILABLE_IN_SECONDS: ${NOTIFICATION_PUSH_JOB_AVAILABLE_IN_SECONDS:-}
      NOTIFICATION_PUSH_JOB_MAX_ATTEMPTS: ${NOTIFICATION_PUSH_JOB_MAX_ATTEMPTS:-}
      NOTIFICATION_PUSH_JOB_TERMINAL_RETENTION_SECONDS: ${NOTIFICATION_PUSH_JOB_TERMINAL_RETENTION_SECONDS:-}
      CHAT_DURABILITY_CLEANUP_BATCH_SIZE: ${CHAT_DURABILITY_CLEANUP_BATCH_SIZE:-}
      EXPO_ACCESS_TOKEN: ${EXPO_ACCESS_TOKEN:-}
      APNS_TEAM_ID: ${APNS_TEAM_ID:-}
      APNS_KEY_ID: ${APNS_KEY_ID:-}
      APNS_PRIVATE_KEY: ${APNS_PRIVATE_KEY:-}
      APNS_PRIVATE_KEY_BASE64: ${APNS_PRIVATE_KEY_BASE64:-}
      APNS_TOPIC: ${APNS_TOPIC:-}
      S3_ENDPOINT: ${S3_ENDPOINT:-}
      S3_ACCESS_KEY_ID: ${S3_ACCESS_KEY_ID:-}
      S3_SECRET_ACCESS_KEY: ${S3_SECRET_ACCESS_KEY:-}
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgis/postgis:17-3.6-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: euphoria
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d euphoria"]
      interval: 5s
      timeout: 5s
      retries: 5

  postgres-integration:
    image: postgis/postgis:17-3.6-alpine
    platform: linux/amd64
    profiles: ["integration"]
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: euphoria_integration
    ports:
      - "${INTEGRATION_POSTGRES_PORT:-55432}:5432"
    tmpfs:
      - /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d euphoria_integration"]
      interval: 1s
      timeout: 5s
      retries: 30

  redis-integration:
    image: redis:7.4-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    profiles: ["integration"]
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    ports:
      - "${INTEGRATION_REDIS_PORT:-56379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 5s
      retries: 30

volumes:
  pgdata:
